<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="#1a4a1a"/>

  <!-- Decorative gold border ring -->
  <rect x="18" y="18" width="476" height="476" rx="76" fill="none" stroke="#b8860b" stroke-width="6" opacity="0.5"/>

  <!-- Open book - left page -->
  <path d="M 78 175 Q 76 158 95 155 L 242 162 L 242 355 L 95 362 Q 76 362 78 345 Z" fill="#dfb95c"/>
  <!-- Open book - right page -->
  <path d="M 434 175 Q 436 158 417 155 L 270 162 L 270 355 L 417 362 Q 436 362 434 345 Z" fill="#c9a040"/>
  <!-- Book spine -->
  <path d="M 242 162 Q 256 159 270 162 L 270 355 Q 256 358 242 355 Z" fill="#7a5010"/>

  <!-- Text lines on left page -->
  <line x1="105" y1="208" x2="228" y2="206" stroke="#1a4a1a" stroke-width="11" stroke-linecap="round" opacity="0.28"/>
  <line x1="105" y1="238" x2="228" y2="236" stroke="#1a4a1a" stroke-width="11" stroke-linecap="round" opacity="0.28"/>
  <line x1="105" y1="268" x2="228" y2="266" stroke="#1a4a1a" stroke-width="11" stroke-linecap="round" opacity="0.28"/>
  <line x1="105" y1="298" x2="195" y2="296" stroke="#1a4a1a" stroke-width="11" stroke-linecap="round" opacity="0.28"/>

  <!-- Text lines on right page -->
  <line x1="284" y1="206" x2="407" y2="208" stroke="#1a4a1a" stroke-width="11" stroke-linecap="round" opacity="0.28"/>
  <line x1="284" y1="236" x2="407" y2="238" stroke="#1a4a1a" stroke-width="11" stroke-linecap="round" opacity="0.28"/>
  <line x1="284" y1="266" x2="407" y2="268" stroke="#1a4a1a" stroke-width="11" stroke-linecap="round" opacity="0.28"/>
  <line x1="317" y1="296" x2="407" y2="298" stroke="#1a4a1a" stroke-width="11" stroke-linecap="round" opacity="0.28"/>

  <!-- App name text -->
  <text x="256" y="432"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="52"
        font-weight="bold"
        fill="#dfb95c"
        text-anchor="middle"
        letter-spacing="3">MASAADIR</text>

  <!-- Subtitle -->
  <text x="256" y="468"
        font-family="Georgia, serif"
        font-size="22"
        fill="#b8860b"
        text-anchor="middle"
        letter-spacing="1"
        opacity="0.85">by Abul Laith</text>
</svg>
